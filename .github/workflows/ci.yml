name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: npm ci
      - run: npm run build

      - name: Build Go binary
        run: |
          mkdir -p backend/cmd/wede/dist
          cp -r dist/* backend/cmd/wede/dist/
          go build -tags embed_frontend -o wede ./backend/cmd/wede
          rm -rf backend/cmd/wede/dist

      - name: Verify binary
        run: ./wede --help || true
