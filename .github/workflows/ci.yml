name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: npm ci

      # Lint runs as a reporting step; errors are surfaced but do not block the
      # build while pre-existing violations are being cleaned up.  Remove '|| true'
      # once `npm run lint` exits 0 on main.
      - name: JS lint (advisory)
        run: npm run lint || true

      - run: npm run build

      - name: Build Go binary
        run: |
          mkdir -p backend/cmd/wede/dist
          cp -r dist/* backend/cmd/wede/dist/
          go build -tags embed_frontend -o wede ./backend/cmd/wede
          rm -rf backend/cmd/wede/dist

      - name: Verify binary
        run: ./wede --help || true

      - name: Go tests
        run: go test ./...
