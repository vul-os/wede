name: Release

# Triggered by pushing a semver tag, e.g. v0.3.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Releases + upload assets

jobs:
  # ── Build cross-compiled binaries ─────────────────────────────────────────────
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Verify tag matches package.json version ────────────────────────────────
      # Run this once (only on the first matrix shard is fine — all shards share
      # the same tag, so any failure would repeat identically; still, matrix jobs
      # run in parallel so we let every shard check and fail fast.)
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            echo "Bump version in package.json to ${TAG_VERSION} before tagging."
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION == $TAG_VERSION"

      - run: npm ci

      - name: JS lint
        run: npm run lint

      - run: npm run build

      # ── Go: test + vet ────────────────────────────────────────────────────────
      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      # ── Cross-compile ─────────────────────────────────────────────────────────
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p backend/cmd/wede/dist
          cp -r dist/* backend/cmd/wede/dist/
          mkdir -p backend/cmd/wede/site
          cp -r site/* backend/cmd/wede/site/

          VERSION="${GITHUB_REF_NAME}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          go build -tags embed_frontend \
            -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "wede-${GOOS}-${GOARCH}${EXT}" ./backend/cmd/wede

          rm -rf backend/cmd/wede/dist backend/cmd/wede/site

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wede-${{ matrix.goos }}-${{ matrix.goarch }}
          path: wede-*

  # ── Create GitHub Release with all artifacts ───────────────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum wede-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "wede ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/wede-*
            artifacts/checksums.txt
